# Put this file inside the nginx `http { ... }` block (include it from nginx.conf).

# Basic request-rate zones (per client IP)
limit_req_zone $binary_remote_addr zone=kc_login_rate:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=kc_api_rate:10m rate=60r/m;

# Optional connection limit
limit_conn_zone $binary_remote_addr zone=kc_conn_limit:10m;
