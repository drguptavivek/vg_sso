# sso1.example.com -> master realm only

server {
  listen 80;
  listen [::]:80;
  server_name sso1.example.com;
  allow 192.168.1.34;
  deny all;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name sso1.example.com;
  allow 192.168.1.34;
  deny all;

  # TLS certs (replace with your actual paths)
  ssl_certificate     /etc/letsencrypt/live/sso1.example.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/sso1.example.com/privkey.pem;

  # Security headers
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Content-Security-Policy "frame-ancestors 'none'; object-src 'none'; base-uri 'self'" always;

  # Global connection/request controls
  limit_conn kc_conn_limit 30;
  limit_req zone=kc_api_rate burst=40 nodelay;

  # Default landing to master realm
  location = / {
    return 302 /realms/master/account/;
  }

  # Never expose management/diagnostic endpoints on public vhost.
  location ~ ^/(metrics|health|management|q/) {
    return 403;
  }

  # Block non-master realm paths
  location ~ ^/realms/(?!master(/|$)).* {
    return 403;
  }

  # Extra protection on login/token endpoints
  location ~ ^/realms/master/protocol/openid-connect/(auth|token|logout) {
    limit_req zone=kc_login_rate burst=10 nodelay;
    proxy_pass http://127.0.0.1:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location / {
    proxy_pass http://127.0.0.1:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }
}
