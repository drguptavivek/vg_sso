server {
  listen 80;
  server_name sso2.local.test;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  server_name sso2.local.test;

  ssl_certificate     /etc/nginx/certs/sso2.local.test.crt;
  ssl_certificate_key /etc/nginx/certs/sso2.local.test.key;

  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Content-Security-Policy "frame-ancestors 'none'; object-src 'none'; base-uri 'self'" always;

  limit_conn kc_conn_limit 30;
  limit_req zone=kc_api_rate burst=40 nodelay;

  real_ip_header X-Forwarded-For;
  real_ip_recursive on;
  set_real_ip_from 172.16.0.0/12;
  set_real_ip_from 192.168.0.0/16;
  set_real_ip_from 10.0.0.0/8;

  location = / {
    return 302 /realms/org-new-delhi/account/;
  }

  location ~ ^/(metrics|health|management|q/) {
    return 403;
  }

  location ~ ^/realms/(?!org-new-delhi(/|$)).* {
    return 403;
  }

  location ~ ^/(admin|admin/|resources/.*/admin/|realms/org-new-delhi/admin|realms/org-new-delhi/admin/) {
    allow 192.168.1.34;
    deny all;

    proxy_pass http://keycloak:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location ~ ^/admin/realms/org-new-delhi/ {
    allow 192.168.1.34;
    deny all;

    proxy_pass http://keycloak:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location ~ ^/realms/org-new-delhi/protocol/openid-connect/(auth|token|logout) {
    limit_req zone=kc_login_rate burst=10 nodelay;
    proxy_pass http://keycloak:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location / {
    proxy_pass http://keycloak:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }
}
