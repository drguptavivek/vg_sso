server {
  listen 80;
  server_name sso1.local.test;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  server_name sso1.local.test;

  ssl_certificate     /etc/nginx/certs/sso1.local.test.crt;
  ssl_certificate_key /etc/nginx/certs/sso1.local.test.key;

  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Content-Security-Policy "frame-ancestors 'none'; object-src 'none'; base-uri 'self'" always;

  limit_conn kc_conn_limit 30;
  limit_req zone=kc_api_rate burst=40 nodelay;

  location = / {
    return 302 /realms/master/account/;
  }

  location ~ ^/(metrics|health|management|q/) {
    return 403;
  }

  location ~ ^/realms/(?!master(/|$)).* {
    return 403;
  }

  location ~ ^/realms/master/protocol/openid-connect/(auth|token|logout) {
    limit_req zone=kc_login_rate burst=10 nodelay;
    proxy_pass http://keycloak:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location / {
    proxy_pass http://keycloak:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }
}
