# sso2.example.com -> org-new-delhi realm
# Admin paths restricted to one internal IP.

server {
  listen 80;
  listen [::]:80;
  server_name sso2.example.com;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name sso2.example.com;

  # TLS certs (replace with your actual paths)
  ssl_certificate     /etc/letsencrypt/live/sso2.example.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/sso2.example.com/privkey.pem;

  # Security headers
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Content-Security-Policy "frame-ancestors 'none'; object-src 'none'; base-uri 'self'" always;

  # Global connection/request controls
  limit_conn kc_conn_limit 30;
  limit_req zone=kc_api_rate burst=40 nodelay;

  # Default landing to client realm
  location = / {
    return 302 /realms/org-new-delhi/account/;
  }

  # Never expose management/diagnostic endpoints on public vhost.
  location ~ ^/(metrics|health|management|q/) {
    return 403;
  }

  # Optional hard block for other realm paths on this hostname
  location ~ ^/realms/(?!org-new-delhi(/|$)).* {
    return 403;
  }

  # Restrict admin console + admin resources to a single IP
  location ~ ^/(admin|admin/|resources/.*/admin/|realms/org-new-delhi/admin|realms/org-new-delhi/admin/) {
    allow 192.168.1.34;
    deny all;

    proxy_pass http://127.0.0.1:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  # Explicitly restrict realm admin REST API paths.
  location ~ ^/admin/realms/org-new-delhi/ {
    allow 192.168.1.34;
    deny all;

    proxy_pass http://127.0.0.1:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  # Extra protection on login/token endpoints
  location ~ ^/realms/org-new-delhi/protocol/openid-connect/(auth|token|logout) {
    limit_req zone=kc_login_rate burst=10 nodelay;
    proxy_pass http://127.0.0.1:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location / {
    proxy_pass http://127.0.0.1:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }
}
