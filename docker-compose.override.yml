services:
  postgres:
    env_file:
      - .env
      - .env.dev
    ports:
      - "5432:5432"

  keycloak:
    env_file:
      - .env
      - .env.dev
    environment:
      KC_HOSTNAME: ""
      KC_HOSTNAME_ADMIN: ""
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    command: [ "start-dev", "--http-port=8080", "--hostname-strict=false", "--health-enabled=true", "--spi-theme-cache-themes=false", "--spi-theme-cache-templates=false", "--features=scripts" ]
    ports:
      - "8080:8080"
      - "9000:9000"
    volumes:
      - ./theme:/opt/keycloak/themes:ro
      - ./scripts:/opt/keycloak/scripts:ro

  step1-init:
    volumes:
      - ./scripts:/opt/keycloak/scripts:ro

  step2-init:
    volumes:
      - ./scripts:/opt/keycloak/scripts:ro

  step3-init:
    volumes:
      - ./scripts:/opt/keycloak/scripts:ro

  step4-init:
    volumes:
      - ./scripts:/opt/keycloak/scripts:ro

  step5-init:
    volumes:
      - ./scripts:/opt/keycloak/scripts:ro

  step6-init:
    volumes:
      - ./scripts:/opt/keycloak/scripts:ro

  step7-init:
    volumes:
      - ./scripts:/opt/keycloak/scripts:ro

  step8-init:
    volumes:
      - ./scripts:/opt/keycloak/scripts:ro
